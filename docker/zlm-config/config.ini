; 注意：请将 secret 改为你自己的值，与 .env 中的 ZLM_SECRET 保持一致
; 如果已配置 .env 中的 ZLM_SECRET，启动时 docker_manager 会使用该值
[api]
apiDebug=1
secret=my_secret_key_2025

[http]
port=9092
allow_cross_domains=1

[rtsp]
port=8554

[rtmp]
port=1935

[rtp_proxy]
port_range=30000-30500
timeoutSec=15

[rtp]
streamNoneReaderDelayMS=10000

[general]
mediaServerId=robot-dog-gw-001
addMuteAudio=1
